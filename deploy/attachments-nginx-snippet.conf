# nginx configuration snippet for Owlmetry event attachment downloads.
#
# Place this inside the `server {}` block for `api.owlmetry.com` on the production VPS.
# Keep the existing `proxy_pass http://127.0.0.1:4000` behaviour for all other paths;
# this only adds an `internal` location that allows the Node process to hand off the
# actual byte streaming to nginx via `X-Accel-Redirect`.
#
# After editing the nginx config, run: `nginx -t && systemctl reload nginx`.
#
# Set these environment variables on the server so the Node process knows to emit
# `X-Accel-Redirect` headers:
#
#   OWLMETRY_ATTACHMENTS_PATH=/opt/owlmetry-attachments
#   OWLMETRY_ATTACHMENTS_INTERNAL_URI=/_attachments/
#   OWLMETRY_ATTACHMENTS_SIGNING_SECRET=<32+ random bytes, NOT the JWT secret>
#
# IMPORTANT: exclude /opt/owlmetry-attachments from the pg_dump backup cron — these
# files are stored on disk and do NOT belong in the database dump.

location /_attachments/ {
    internal;  # only accepts sub-requests from Node via X-Accel-Redirect
    alias /opt/owlmetry-attachments/;

    # Serve files with whatever Content-Type + Content-Disposition the upstream set.
    # Do not let nginx guess the MIME type — the upstream already picked the right one
    # and explicitly added Content-Disposition: attachment to prevent auto-execution.
    types { }
    default_type application/octet-stream;
    add_header X-Content-Type-Options nosniff always;

    # Big files sometimes sit on disk for a while. Raise send_timeout enough that a
    # slow client can finish downloading a 250 MB attachment over a mediocre link.
    send_timeout 5m;

    # Prevent any accidental caching of sensitive attachments at intermediaries.
    add_header Cache-Control "private, no-store" always;
}
